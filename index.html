<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> automatic cicd devops project </title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color:#fff;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
    }

    header h1 { font-size:24px; }

    nav a {
      margin:0 15px;
      text-decoration:none;
      color:#fff;
      transition:0.3s;
    }

    nav a:hover { color:#00f2fe; }

    .hero {
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
    }

    .hero h2 {
      font-size:48px;
      margin-bottom:20px;
    }

    .hero button {
      padding:12px 25px;
      border:none;
      border-radius:30px;
      background:#00f2fe;
      color:#000;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .hero button:hover { transform:scale(1.1); }

    .cards {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:50px;
    }

    .card {
      background:rgba(255,255,255,0.1);
      padding:20px;
      border-radius:15px;
      backdrop-filter:blur(10px);
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-10px);
      background:rgba(255,255,255,0.2);
    }

    .card h3 { margin-bottom:10px; }

    .dashboard {
      padding:50px;
      text-align:center;
    }

    .progress-bar {
      width:80%;
      margin:20px auto;
      background:#444;
      border-radius:20px;
      overflow:hidden;
    }

    .progress {
      height:20px;
      width:0;
      background:#00f2fe;
      transition:1s;
    }

    footer {
      text-align:center;
      padding:20px;
      background:rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<header>
  <h1>DevOps GUI</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#dashboard">Dashboard</a>
  </nav>
</header>

<section class="hero">
  <h2>Modern Cloud Dashboard</h2>
  <p>Beautiful UI with animations & features</p>
  <button onclick="scrollToFeatures()">Explore</button>
</section>

<section id="features" class="cards">
  <div class="card">
    <h3>Docker</h3>
    <p>Container management UI</p>
  </div>
  <div class="card">
    <h3>Kubernetes</h3>
    <p>Cluster monitoring</p>
  </div>
  <div class="card">
    <h3>AWS</h3>
    <p>Cloud infrastructure</p>
  </div>
</section>

<section id="dashboard" class="dashboard">
  <h2>System Progress</h2>
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
  <button onclick="increaseProgress()">Load Data</button>
</section>

<footer>
  <p>© 2026 DevOps Dashboard</p>
</footer>

<script>
  function scrollToFeatures(){
    document.getElementById('features').scrollIntoView({behavior:'smooth'});
  }

  let value = 0;
  function increaseProgress(){
    if(value < 100){
      value += 20;
      document.getElementById('progress').style.width = value + '%';
    }
  }
</script>

</body>
</html>
